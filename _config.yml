# Remote theme directory
remote_theme: analytics-link/analytics-link.github.io

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-remote-theme

#-------------------------------
# General Site Settings
title: Alhassan Sahad
description: "Hi I'm Alhassan, and I'm a Data Analyst. My portfolio focuses on interesting projects I've recently undertaken, with a strong emphasis on business impact. Please visit my GitHub & LinkedIn pages (or download my Resume) by using the links below!"
baseurl: "" # keep empty for a custom domain at the root
url: "https://alhassansahad.com" # your custom domain

#-------------------------------
# About Section
# (Quoted because it contains HTML)
subtitle: ' <span style="color:#f58506"> </span>'
location: "Seattle, USA"
resume_url: /docs/Louis_Agyekum_Senior_Analyst_Modelling_Resu.pdf
avatar_image: /img/louis-agyekum.jpg

#-------------------------------
# Contact links
# linkedln: "https://www.linkedin.com/in/louis-ag/#" # Add your linkedln handle
# github: "https://github.com/asahad/#" # Add your github handle

paginate: 6
paginate_path: "/page/:num"

sass:
  sass_dir: _sass
  style: compressed # possible values: nested expanded compact compressed

defaults:
  - scope:
      type: posts
    values:
      layout: post
      read_time: true
      share: false

