# Remote theme directory
remote_theme: analytics-link/analytics-link.github.io

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-remote-theme

#-------------------------------
# General Site Settings
title: Alhassan Sahad
description: "Data Analyst & ML Engineer based in Seattle. I build end-to-end machine learning pipelines and turn complex datasets into clear, actionable business insights -from customer segmentation and deep learning to causal inference and statistical testing."
baseurl: "" # keep empty for a custom domain at the root
url: "https://alhassansahad.com" # your custom domain
author: Alhassan Sahad

#-------------------------------
# About Section
# (Quoted because it contains HTML)
subtitle: 'Data Analyst <span style="color:#f58506">& ML Engineer</span>'
location: "Seattle, WA"
resume_url: /docs/Resume_Alhassan_Sahad.pdf
avatar_image: /img/profile_picture_alhassan_sahad.jpg

#-------------------------------
# Contact links
# linkedln: "https://www.linkedin.com/in/louis-ag/#" # Add your linkedln handle
# github: "https://github.com/asahad/#" # Add your github handle

paginate: 6
paginate_path: "/page/:num"

sass:
  sass_dir: _sass
  style: compressed # possible values: nested expanded compact compressed

defaults:
  - scope:
      type: posts
    values:
      layout: post
      read_time: true
      share: false

